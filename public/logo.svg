<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none" role="img" aria-label="FOSS Church logo">
  <defs>
    <linearGradient id="fcBar" x1="8" y1="6" x2="40" y2="42" gradientUnits="userSpaceOnUse">
      <stop stop-color="#2dd4bf"/>
      <stop offset="1" stop-color="#38bdf8"/>
    </linearGradient>
  </defs>
  <!-- connecting traces -->
  <g stroke="url(#fcBar)" stroke-width="5.5" stroke-linecap="round">
    <line x1="24" y1="8" x2="24" y2="40"/>
    <line x1="11" y1="20" x2="37" y2="20"/>
  </g>
  <!-- network nodes at the tips: faith meets open tech -->
  <g fill="#f5b942">
    <circle cx="24" cy="8" r="3.6"/>
    <circle cx="24" cy="40" r="3.6"/>
    <circle cx="11" cy="20" r="3.6"/>
    <circle cx="37" cy="20" r="3.6"/>
  </g>
  <!-- central hub -->
  <circle cx="24" cy="20" r="3" fill="#0b0f17"/>
  <circle cx="24" cy="20" r="1.5" fill="#f5b942"/>
</svg>
